# ═══════════════════════════════════════════════════════════════
# Claude Web — 专用 tmux 配置
# 仅通过 `tmux -L claude-web -f agent/tmux.conf` 加载，
# 与用户自己的 ~/.tmux.conf 完全隔离，互不影响。
#
# 作用：让每个终端会话跑在独立的 tmux 服务器（守护进程）里，
#       Agent 进程重启 / 崩溃时只断开 tmux 客户端（detach），
#       会话内的 shell + claude + 运行中的进程 + 滚屏全部保留。
#       新 Agent 重连后 re-attach 即恢复 live 会话。
# ═══════════════════════════════════════════════════════════════

# 隐藏状态栏——对终端用户透明，看起来就是普通终端
set -g status off

# 鼠标交给应用（claude 等）自行处理，避免 tmux 拦截选择/滚动
set -g mouse off

# 大回滚缓冲
set -g history-limit 100000

# ESC 零延迟，改善 vim / claude TUI 手感
set -sg escape-time 0

# 核心：客户端断开（Agent 重启）后会话保留，绝不自动销毁
set -g destroy-unattached off

# 窗口尺寸跟随最近活动的客户端（单客户端场景即跟随浏览器终端尺寸）
set -g window-size latest
setw -g aggressive-resize on

# 焦点事件透传给应用
set -g focus-events on

# 真彩色
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",*256col*:Tc"
