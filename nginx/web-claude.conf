# ═══════════════════════════════════════════════════════════════════
# Claude Web — Nginx 反向代理配置
#
# 部署步骤：
#   1. sudo cp nginx/web-claude.conf /etc/nginx/sites-available/web-claude
#   2. sudo ln -s /etc/nginx/sites-available/web-claude /etc/nginx/sites-enabled/
#   3. 替换下面的 your-domain.com 为你的真实域名
#   4. sudo certbot --nginx -d your-domain.com    # 自动获取 Let's Encrypt 证书
#   5. sudo nginx -t && sudo systemctl reload nginx
#
# 架构：
#   浏览器 ──WSS──→ Nginx (:443) ──WS──→ Node.js Server (:3002, localhost)
# ═══════════════════════════════════════════════════════════════════

# ─── HTTP → HTTPS 重定向 ──────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    # Let's Encrypt 验证
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ─── HTTPS + WebSocket 代理 ───────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;

    # ── TLS 证书（certbot 自动填充）────────────────────────────
    # ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # ── 现代 TLS 配置 ──────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── 安全头 ─────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;

    # ── 日志 ───────────────────────────────────────────────────
    access_log /var/log/nginx/web-claude-access.log;
    error_log  /var/log/nginx/web-claude-error.log;

    # ── 代理到 Node.js Server ──────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;

        # WebSocket 升级
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 传递真实 IP（给 Server 的速率限制和审计用）
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时：WebSocket 是长连接，必须设大
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # 缓冲：终端输出可能很大，关闭代理缓冲保证实时性
        proxy_buffering off;
    }
}
